name: one_day_beijing_itinerary
description: One Day Beijing Itinerary structure
hierarchy:
  Root:
    Day:
      POI:
        Notes: {}
        Stop:
          Meal: {}
          Notes: {}
          Transport_Leg: {}
        Transport_Leg: {}
      Stop:
        Meal: {}
        Notes: {}
        Transport_Leg: {}
nodes:
  Day:
    type: container
    fields:
    - children
    - end_time
    - start_time
    - theme
    children:
    - POI
    - Stop
    index_attr: index
  Stop:
    type: container
    fields:
    - address_or_area
    - duration
    - name
    - tickets_or_entry
    - time_end
    - time_start
    - what_to_do
    children:
    - Meal
    - Notes
    - Transport_Leg
    index_attr: index
  Meal:
    type: leaf
    fields:
    - budget_level
    - meal_type
    - suggested_spot
    - time
    - what_to_order
    children: []
  Notes:
    type: leaf
    fields:
    - backup_option
    - time_saver
    - tip
    children: []
  Transport_Leg:
    type: leaf
    fields:
    - cost_hint
    - estimated_time
    - from
    - mode
    - route_hint
    - to
    children: []
  POI:
    type: container
    fields:
    - address_or_area
    - duration
    - tickets_or_entry
    - time_end
    - time_start
    - what_to_do
    children:
    - Notes
    - Stop
    - Transport_Leg
  Root:
    type: root
    fields:
    - title
    - date_or_day_label
    - starting_area
    - pace
    - assumptions
    children:
    - Day
root: Root
content_root: Root
data_files:
  one_day_beijing_itinerary: memory/task/one_day_beijing_itinerary.xml
default_data: one_day_beijing_itinerary
examples_file: prompts/query_generator/domains/xpath_examples_one_day_beijing_itinerary.txt
syntax_rules: '- Paths start with /Root

  - Node types: Root, Day, Stop, Transport_Leg, Meal, Notes

  - Indices: Node[1], Node[-1], Node[1:3]

  - Logical: AND / OR / not() combine predicates WITHIN brackets'
