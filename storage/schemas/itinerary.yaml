# Itinerary Tree Schema
# Defines the structure for travel itinerary trees with versioning

name: "itinerary"
description: "Travel itinerary with versioning, days, POIs and restaurants"

# Tree hierarchy (for documentation and LLM prompt generation)
hierarchy: |
  Root (root node)
  └── Itinerary_Version (container, indexed by @number)
      ├── patch_info: describes changes made in this version
      ├── conversation_history: user's natural language request
      └── Itinerary (container)
          └── Day (container, indexed by @index)
              ├── POI (leaf)
              └── Restaurant (leaf)

# Node type definitions with fields
nodes:
  Root:
    type: root
    fields: []
    children: ["Itinerary_Version"]

  Itinerary_Version:
    type: container
    index_attr: "number"  # Uses <Itinerary_Version number="1"> for identification
    fields:
      - patch_info
      - conversation_history
    children: ["Itinerary"]

  Itinerary:
    type: container
    fields: []  # Container node - no direct content fields
    children: ["Day"]

  Day:
    type: container
    index_attr: "index"  # Uses <Day index="1"> for identification
    fields: []  # Container node - no direct content fields
    children: ["POI", "Restaurant"]

  POI:
    type: leaf
    fields:
      - name
      - time_block
      - description
      - travel_method
      - expected_cost
      - highlights
    children: []

  Restaurant:
    type: leaf
    fields:
      - name
      - time_block
      - description
      - travel_method
      - expected_cost
      - highlights
    children: []

# Available data files for this schema
data_files:
  travel_memory_3day: "memory/travel/travel_memory_3day.xml"
  travel_memory_5day: "memory/travel/travel_memory_5day.xml"
  travel_memory_3day_diff: "memory/travel/travel_memory_3day_diff.xml"
  travel_memory_10day_themed: "memory/travel/travel_memory_10day_themed.xml"
  travel_toronto_10day: "memory/travel/travel_toronto_10day.xml"

# Default data file to use
default_data: "travel_memory_3day"

# XPath query generation prompt components
examples_file: "prompts/xpath_examples_itinerary.txt"

# Syntax rules specific to this schema
syntax_rules: |
  - Paths start with /Itinerary
  - Node types: Itinerary, Day, POI, Restaurant
  - Indices: Day[@index='2'], POI[2], POI[-1], POI[1:3]
  - Logical: AND / OR / not() combine predicates WITHIN brackets (e.g., [A OR B], [not(A)]), never between paths

# Associated prompt file for version resolution (new 2-stage approach)
version_resolver_prompt: "prompts/version_resolver.txt"
