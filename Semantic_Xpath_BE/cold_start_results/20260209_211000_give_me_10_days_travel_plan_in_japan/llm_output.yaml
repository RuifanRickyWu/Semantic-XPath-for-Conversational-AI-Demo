domain:
  name: travel
  description: Travel planning tasks such as itineraries and multi-day trip schedules.
task:
  name: japan_10_day_trip
  title: 10-Day Japan Travel Plan
  description: A balanced 10-day itinerary covering Tokyo, Hakone, Kyoto, Nara, Osaka,
    Hiroshima, and Miyajima with cultural sites, city highlights, and travel logistics.
schema:
  name: itinerary
  description: Multi-day travel itinerary with ordered days, activities, and accommodation
    entries.
  root: Itinerary
  nodes:
    Itinerary:
      type: root
      fields:
      - title
      - summary
      children:
      - Day
    Day:
      type: container
      index_attr: index
      fields:
      - date_note
      - focus
      children:
      - Activity
      - Accommodation
    Activity:
      type: leaf
      fields:
      - name
      - time_block
      - description
      - highlights
      children: []
    Accommodation:
      type: leaf
      fields:
      - name
      - time_block
      - notes
      - highlights
      children: []
content:
  root_fields:
    title: '10-Day Japan Essentials: Tokyo to Miyajima'
    summary: A 10-day route combining major cities, cultural experiences, natural
      scenery, and efficient travel connections for first-time or return visitors
      to Japan.
  root_attrs: {}
  children:
  - tag: Day
    attrs:
      index: '1'
    fields:
      date_note: Arrival in Tokyo
      focus: Settle in and light exploration
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Arrive at Narita/Haneda, transfer to hotel
        time_block: Morning - Early Afternoon
        description: Clear immigration, take airport transfer to central Tokyo, check
          in or store luggage.
        highlights:
        - Smooth airport transfer
        - First view of Tokyo neighborhoods
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Shinjuku stroll & observation
        time_block: Afternoon - Evening
        description: Explore Shinjuku station area, visit Metropolitan Government
          Building for free city views and have dinner nearby.
        highlights:
        - City skyline view
        - Casual izakaya dinner
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Tokyo hotel (Shinjuku or Shibuya area)
        time_block: Night
        notes: Choose convenient station access for subsequent travel.
        highlights:
        - Central location
        - Easy train access
      children: []
  - tag: Day
    attrs:
      index: '2'
    fields:
      date_note: Tokyo - East and Central
      focus: Classic Tokyo neighborhoods and cultural sites
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Asakusa & Senso-ji
        time_block: Morning
        description: Visit Senso-ji temple, stroll Nakamise shopping street for snacks
          and souvenirs.
        highlights:
        - Historic temple
        - Traditional street foods
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Ueno Park & Museums or Ameya-Yokocho Market
        time_block: Late Morning - Early Afternoon
        description: Choose a museum (Tokyo National Museum) or explore market stalls
          and casual eats.
        highlights:
        - Cultural museums
        - Local market vibe
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Akihabara or Ginza depending on interest
        time_block: Afternoon - Evening
        description: Electronics and anime culture in Akihabara or upscale shopping
          and dining in Ginza.
        highlights:
        - Pop culture or luxury shopping
        - Evening dining options
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Tokyo hotel (same area)
        time_block: Night
        notes: Rest before Hakone trip tomorrow.
        highlights:
        - Convenient departure
        - Good transit links
      children: []
  - tag: Day
    attrs:
      index: '3'
    fields:
      date_note: Day trip to Hakone (or overnight)
      focus: Onsen, views of Mt. Fuji, and scenic transport
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Travel to Hakone via Odawara/Shinkansen + local transport
        time_block: Morning
        description: Take bullet train to Odawara, then Hakone Tozan Railway/cable
          car and sightseeing loop.
        highlights:
        - Efficient shinkansen leg
        - Scenic mountain transport
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: 'Hakone Sightseeing: Open-Air Museum and Lake Ashi'
        time_block: Afternoon
        description: Visit Hakone Open-Air Museum and take a boat on Lake Ashi for
          views of Mt. Fuji (weather permitting).
        highlights:
        - Art & nature
        - Possible Mt. Fuji views
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Ryokan or onsen hotel in Hakone (optional overnight)
        time_block: Night
        notes: Enjoy onsen and kaiseki dinner if staying overnight.
        highlights:
        - Traditional lodging
        - Relaxing hot springs
      children: []
  - tag: Day
    attrs:
      index: '4'
    fields:
      date_note: Travel to Kyoto
      focus: Transit day with evening Kyoto introduction
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Shinkansen to Kyoto
        time_block: Morning - Early Afternoon
        description: Board bullet train from Odawara or Tokyo to Kyoto; check into
          accommodation and rest.
        highlights:
        - Fast transfer
        - Comfortable travel
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Gion evening walk and Yasaka Shrine
        time_block: Evening
        description: Stroll historic Gion district, glimpse traditional streets and
          Yasaka Shrine illuminated at night.
        highlights:
        - Historic atmosphere
        - Possible geisha sightings
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Kyoto machiya or hotel near Kawaramachi
        time_block: Night
        notes: Central location for walking to major sites.
        highlights:
        - Traditional option available
        - Good access to public transit
      children: []
  - tag: Day
    attrs:
      index: '5'
    fields:
      date_note: Kyoto full day
      focus: Iconic temples and bamboo groves
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Fushimi Inari Taisha early visit
        time_block: Morning
        description: Beat crowds for the torii gate trail at Fushimi Inari.
        highlights:
        - Endless torii gates
        - Morning light
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Kiyomizu-dera and Higashiyama district
        time_block: Late Morning - Afternoon
        description: Explore the temple and charming historic streets leading to shops
          and tea houses.
        highlights:
        - Panoramic views
        - Traditional crafts and snacks
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Arashiyama bamboo grove and Tenryu-ji
        time_block: Afternoon
        description: Visit the bamboo grove, riverside area, and Tenryu-ji temple;
          consider boat or stroll.
        highlights:
        - Scenic nature spot
        - Relaxed pace
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Kyoto hotel (same area)
        time_block: Night
        notes: Rest; optional evening tea ceremony.
        highlights:
        - Central base
        - Evening cultural options
      children: []
  - tag: Day
    attrs:
      index: '6'
    fields:
      date_note: Day trip to Nara or more Kyoto
      focus: Deer park and Todai-ji or deeper Kyoto neighborhoods
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: 'Nara: Todai-ji and Nara Park'
        time_block: Morning - Afternoon
        description: Meet free-roaming deer, visit the Great Buddha at Todai-ji, and
          stroll the park.
        highlights:
        - Giant Buddha
        - Friendly deer encounters
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: 'Return to Kyoto: Philosopher''s Path or tea district'
        time_block: Late Afternoon
        description: Walk the Philosopher's Path or visit smaller temples and cafes
          in the area.
        highlights:
        - Scenic walk
        - Quiet temples
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Kyoto hotel
        time_block: Night
        notes: Prepare for transfer to Osaka tomorrow.
        highlights:
        - Easy transit to next city
        - Pack for short move
      children: []
  - tag: Day
    attrs:
      index: '7'
    fields:
      date_note: Travel to Osaka
      focus: City food culture and evening nightlife
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Short train to Osaka, check into hotel
        time_block: Morning
        description: Move to Osaka and settle in near Namba or Umeda for best dining
          options.
        highlights:
        - Quick transit
        - Vibrant neighborhoods
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Dotonbori and Kuromon Market food crawl
        time_block: Afternoon - Evening
        description: Taste takoyaki, okonomiyaki, and market specialties; enjoy neon-lit
          canal area at night.
        highlights:
        - Street food heaven
        - Iconic neon signage
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Osaka hotel (Namba/Umeda)
        time_block: Night
        notes: Stay central for next day's travel or Osaka castle visit.
        highlights:
        - Central nightlife access
        - Good train connections
      children: []
  - tag: Day
    attrs:
      index: '8'
    fields:
      date_note: Osaka - optional day trip
      focus: Castle, shopping, or Universal Studios
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Osaka Castle and park visit
        time_block: Morning
        description: Tour the historic castle and its museum, then walk the surrounding
          park.
        highlights:
        - Historical landmark
        - Nice photo spots
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: 'Afternoon options: Universal Studios Japan or shopping in Umeda'
        time_block: Afternoon - Evening
        description: Choose theme park fun or department store and underground shopping
          exploration.
        highlights:
        - Family-friendly option
        - Retail and dining choices
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Osaka hotel
        time_block: Night
        notes: Prepare for early transfer to Hiroshima tomorrow.
        highlights:
        - Rest before long-distance travel
        - Pack light for transit
      children: []
  - tag: Day
    attrs:
      index: '9'
    fields:
      date_note: Travel to Hiroshima and Miyajima
      focus: Peace Memorial Park and Itsukushima Shrine
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: Shinkansen to Hiroshima, visit Peace Memorial Park & Museum
        time_block: Morning - Afternoon
        description: Spend time at the museum and memorial for reflection and history.
        highlights:
        - Important historical site
        - Reflective museum exhibits
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Ferry to Miyajima and Itsukushima Shrine
        time_block: Late Afternoon - Evening
        description: See the floating torii gate at low or high tide and stroll the
          island; try local oysters.
        highlights:
        - Iconic torii gate
        - Scenic island atmosphere
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Hiroshima or Miyajima ryokan/hotel
        time_block: Night
        notes: Overnight on island for sunset/sunrise views if desired.
        highlights:
        - Scenic stay option
        - Easy access to shrine
      children: []
  - tag: Day
    attrs:
      index: '10'
    fields:
      date_note: Return to Tokyo or depart from Kansai/Osaka
      focus: Transit and departure preparations
    children:
    - tag: Activity
      attrs: {}
      fields:
        name: 'Return travel: Shinkansen to Tokyo or transfer to Kansai Intl'
        time_block: Morning - Afternoon
        description: Allow ample time for transfers; consider direct shinkansen back
          to Tokyo or train/airport transfer for international flight.
        highlights:
        - Plan buffer time
        - Final souvenir shopping
      children: []
    - tag: Activity
      attrs: {}
      fields:
        name: Last-minute city time depending on flight schedule
        time_block: Afternoon - Evening
        description: If time permits, enjoy a final meal or short walk in departure
          city before heading to airport.
        highlights:
        - Memorable final meal
        - Relaxed departure pace
      children: []
    - tag: Accommodation
      attrs: {}
      fields:
        name: Departure night or airport hotel (if needed)
        time_block: Night
        notes: Stay near airport if early flight; otherwise final night in Tokyo/Osaka.
        highlights:
        - Convenient for flight
        - Final packing time
      children: []
user_facing:
  title: "10-Day Japan Trip \u2014 Quick Overview"
  overview: A practical 10-day route from Tokyo to Miyajima balancing major sights,
    culture, food, and comfortable travel pacing.
  sections:
  - title: Trip Flow Summary
    summary: Start in Tokyo, enjoy a Hakone nature/onsen stop, then immerse in Kyoto
      culture before finishing with Osaka and Hiroshima/Miyajima.
    bullets:
    - 'Days 1-3: Tokyo highlights and Hakone day/overnight'
    - 'Days 4-6: Kyoto and Nara cultural core'
    - 'Days 7-9: Osaka urban food scene then Hiroshima/Miyajima'
  - title: Daily Pacing Advice
    summary: Mix busy sightseeing days with lighter travel or onsen/rest days to avoid
      burnout.
    bullets:
    - Plan mornings for top sites to avoid crowds
    - Reserve evenings for relaxed dining or neighborhood walks
    - Include one full rest or optional activity day (e.g., Universal Studios, Hakone
      onsen)
  - title: Transport and Tickets
    summary: Use JR Pass for long-distance shinkansen legs and buy local tickets or
      IC card for city transit.
    bullets:
    - Consider a 7-day JR Pass activated for Kyoto-to-Hiroshima leg
    - Get a Suica/Pasmo or Icoca IC card for city trains and buses
    - Reserve shinkansen seats for peak travel days
  - title: Accommodation Tips
    summary: Stay near major stations for convenience and experience at least one
      ryokan/onsen overnight.
    bullets:
    - 'Tokyo: Shinjuku/Shibuya for connectivity'
    - 'Kyoto: Central Kawaramachi/Gion for walking access'
    - Try a ryokan in Hakone or Miyajima for traditional lodging
  - title: Food & Cultural Notes
    summary: Sample regional specialties and be mindful of local etiquette in temples,
      shrines, and public transport.
    bullets:
    - Try takoyaki and okonomiyaki in Osaka, oysters in Miyajima
    - Remove shoes where required and keep phone conversations low on trains
    - Carry cash for small vendors; many places accept cards but not all
  - title: Final Departure Planning
    summary: Build buffer time for transfers and last-minute packing before your international
      flight.
    bullets:
    - Allow 3+ hours for airport transfer if departing same day as travel
    - Check luggage forwarding services if moving between many cities
    - Confirm flight check-in and customs timing the day before departure
