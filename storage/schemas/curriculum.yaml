# Curriculum Tree Schema
# Defines the structure for educational curriculum trees

name: "curriculum"
description: "Educational curriculum with courses, concepts and exercises"

# Tree hierarchy (for documentation and LLM prompt generation)
hierarchy: |
  Curriculum (root)
  ├── Course
  │   ├── Concept
  │   └── Exercise

# Node type definitions
nodes:
  Curriculum:
    type: root
    fields: []
    children: ["Course"]
    
  Course:
    type: container
    fields: ["name", "description", "level", "duration"]
    children: ["Concept", "Exercise"]
    
  Concept:
    type: leaf
    fields: ["name", "description", "difficulty"]
    children: []
    
  Exercise:
    type: leaf
    fields: ["name", "description", "type", "points"]
    children: []

# Available data files for this schema
data_files:
  curriculum_sample: "memory/curriculum/curriculum_sample.xml"

# Default data file to use
default_data: "curriculum_sample"

# Associated prompt file for XPath query generation
prompt_file: "prompts/xpath_query_generator_curriculum.txt"



