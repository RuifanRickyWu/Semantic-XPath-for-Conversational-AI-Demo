# TodoList Tree Schema
# Defines the structure for task management trees

name: "todolist"
description: "Task management with projects, tasks and subtasks"

# Tree hierarchy (for documentation and LLM prompt generation)
hierarchy: |
  TodoList (root)
  ├── Project
  │   └── Task
  │       └── SubTask

# Node type definitions
nodes:
  TodoList:
    type: root
    fields: []
    children: ["Project"]
    
  Project:
    type: container
    fields: ["name", "description"]
    children: ["Task"]
    
  Task:
    type: container
    fields: ["title", "description", "status", "priority", "due_date"]
    children: ["SubTask"]
    
  SubTask:
    type: leaf
    fields: ["title", "description", "status"]
    children: []

# Available data files for this schema
data_files:
  todolist_sample: "memory/todo_list/todolist_sample.xml"

# Default data file to use
default_data: "todolist_sample"

# Associated prompt file for XPath query generation
prompt_file: "prompts/xpath_query_generator_todolist.txt"

