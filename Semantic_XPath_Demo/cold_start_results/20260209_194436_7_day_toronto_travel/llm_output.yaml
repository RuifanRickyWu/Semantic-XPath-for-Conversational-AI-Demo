        highlights:
        - souvenirs
        - cafes
      children: []
    - tag: Transportation
      attrs: {}
      fields:
        mode: Transfer to airport / train station
        time_block: As scheduled
        notes: Allow time for travel and check-in.
        highlights:
        - plan buffer
        - confirm rides
      children: []
user_facing:
  title: 7-Day Toronto Trip Plan
  overview: A seven-day balanced plan mixing landmark highlights, neighborhood exploration,
    optional day trips, and relaxed pacing so you can see Toronto without rushing.
  sections:
  - title: "Day 1 \u2014 Arrival & Waterfront"
    summary: Settle in and take a gentle waterfront stroll to recover from travel.
    bullets:
    - Transfer from Pearson to downtown (UP Express recommended)
    - Walk along Harbourfront to stretch your legs
    - Dinner with lake views to end the day
  - title: "Day 2 \u2014 Downtown Icons"
    summary: See major downtown attractions like CN Tower and St. Lawrence Market.
    bullets:
    - Morning at CN Tower and Ripley's Aquarium
    - Lunch and browsing at St. Lawrence Market
    - Explore nearby historic streets
  - title: "Day 3 \u2014 Museums & Gardens"
    summary: Visit cultural highlights like the ROM and choose a quieter garden or
      castle visit.
    bullets:
    - Royal Ontario Museum in the morning
    - Afternoon at Casa Loma or Allan Gardens depending on energy
    - Light evening near your neighborhood
  - title: "Day 4 \u2014 Toronto Islands"
    summary: Take a ferry to the islands for a relaxed day of beaches and skyline
      views.
    bullets:
    - Morning ferry from Jack Layton Terminal
    - Rent a bike or picnic on Centre Island
    - Return for a calm dinner downtown
  - title: "Day 5 \u2014 Kensington Market & Queen West"
    summary: Explore eclectic neighborhoods for shopping, street art, and dining.
    bullets:
    - Wander Kensington Market in the morning
    - Afternoon and evening on Queen Street West
    - Try local cafes and vintage shops
  - title: "Day 6 \u2014 Day Trip or More Museums"
    summary: Choose between a full-day trip (e.g., Niagara Falls) or deeper museum
      visits in Toronto.
    bullets:
    - Niagara Falls for nature and photos or AGO for art
    - Plan transport ahead if going outside the city
    - Reserve time for dinner back in Toronto
  - title: "Day 7 \u2014 Flexible Departure"
    summary: A flexible morning for last-minute shopping or a relaxed stroll before
      you leave.
    bullets:
    - Light morning activity based on your departure time
    - Confirm airport/train transfer and allow buffer
    - Grab a final coffee or souvenir
