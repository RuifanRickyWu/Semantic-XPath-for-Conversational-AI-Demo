# TodoList Tree Schema
# Defines the structure for task management trees with versioning

name: "todolist"
description: "Task management with versioning, projects, tasks and subtasks"

# Tree hierarchy (for documentation and LLM prompt generation)
hierarchy: |
  TodoList (root)
  └── Version (container, indexed by @number)
      ├── patch_info: describes changes made in this version
      ├── conversation_history: user's natural language request
      └── Project (container)
          └── Task (container)
              └── SubTask (leaf)

# Node type definitions
nodes:
  TodoList:
    type: root
    fields: []
    children: ["Version"]
    
  Version:
    type: container
    index_attr: "number"  # Uses <Version number="1"> for identification
    fields:
      - patch_info
      - conversation_history
    children: ["Project"]
    
  Project:
    type: container
    fields: ["name", "description"]
    children: ["Task"]
    
  Task:
    type: container
    fields: ["title", "description", "status", "priority", "due_date"]
    children: ["SubTask"]
    
  SubTask:
    type: leaf
    fields: ["title", "description", "status"]
    children: []

# Available data files for this schema
data_files:
  todolist_sample: "memory/todo_list/todolist_sample.xml"

# Default data file to use
default_data: "todolist_sample"

# Associated prompt file for XPath query generation
prompt_file: "prompts/xpath_query_generator_todolist.txt"

