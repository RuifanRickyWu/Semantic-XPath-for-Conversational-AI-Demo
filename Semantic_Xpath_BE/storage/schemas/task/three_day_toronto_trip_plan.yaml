name: three_day_toronto_trip_plan
description: Three Day Toronto Trip Plan structure
hierarchy:
  Root:
    Day:
      Time_Block:
        Stop: {}
      Food_Suggestions: {}
      Logistics: {}
      Options: {}
nodes:
  Root:
    type: root
    fields:
    - title
    - trip_style
    - notes
    children:
    - Day
  Day:
    type: container
    fields:
    - theme
    - home_base_area
    - estimated_walking_level
    children:
    - Time_Block
    - Food_Suggestions
    - Logistics
    - Options
    index_attr: day_number
  Time_Block:
    type: container
    fields:
    - start_time
    - end_time
    - area
    children:
    - Stop
    index_attr: block_name
  Stop:
    type: leaf
    fields:
    - name
    - what_to_do
    - duration
    - reservation_needed
    - cost_level
    - transit_hint
    children: []
  Food_Suggestions:
    type: leaf
    fields:
    - breakfast
    - lunch
    - dinner
    - snacks
    children: []
  Logistics:
    type: leaf
    fields:
    - getting_around
    - tickets_and_timing
    - weather_backup
    children: []
  Options:
    type: leaf
    fields:
    - swap_if_rain
    - swap_if_with_kids
    - swap_if_museum_focus
    - swap_if_food_focus
    children: []
root: Root
content_root: Root
data_files:
  three_day_toronto_trip_plan: memory/task/three_day_toronto_trip_plan.xml
default_data: three_day_toronto_trip_plan
examples_file: prompts/query_generator/domains/xpath_examples_three_day_toronto_trip_plan.txt
syntax_rules: '- Paths start with /Root

  - Node types: Root, Day, Time_Block, Stop, Food_Suggestions, Logistics, Options

  - Indices: Node[1], Node[-1], Node[1:3]

  - Logical: AND / OR / not() combine predicates WITHIN brackets'
