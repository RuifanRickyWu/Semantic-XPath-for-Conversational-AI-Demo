domain:
  name: travel
  description: Travel planning tasks such as itineraries and day-by-day activity plans.
task:
  name: toronto_7day_trip
  title: 7-Day Toronto Trip Plan
  description: A detailed 7-day travel plan for Toronto with daily themes, points
    of interest, restaurants, and transport notes.
schema:
  name: itinerary
  description: Travel itinerary with ordered days and daily items (POI, Restaurant,
    Transport).
  root: Itinerary
  nodes:
    Itinerary:
      type: root
      fields:
      - title
      - summary
      children:
      - Day
    Day:
      type: container
      index_attr: index
      fields:
      - theme
      children:
      - POI
      - Restaurant
      - Transport
    POI:
      type: leaf
      fields:
      - name
      - time_block
      - description
      - highlights
      children: []
    Restaurant:
      type: leaf
      fields:
      - name
      - time_block
      - description
      - highlights
      children: []
    Transport:
      type: leaf
      fields:
      - mode
      - time_block
      - notes
      children: []
content:
  root_fields:
    title: 7-Day Toronto Trip
    summary: A balanced week in Toronto covering downtown highlights, museums, neighbourhoods,
      islands, and a day trip to Niagara Falls. Each day includes main POIs, a recommended
      restaurant, and transport notes.
  root_attrs: {}
  children:
  - tag: Day
    attrs:
      index: '1'
    fields:
      theme: Arrival & Downtown Orientation
    children:
    - tag: Transport
      attrs: {}
      fields:
        mode: Taxi / UP Express
        time_block: Afternoon
        notes: Arrive at YYZ, take UP Express to Union Station or taxi to hotel.
      children: []
    - tag: POI
      attrs: {}
      fields:
        name: CN Tower & Harbourfront
        time_block: 4:00 PM - 7:00 PM
        description: Visit CN Tower viewpoint and stroll along the harbourfront promenade.
        highlights:
        - City views
        - Harbourwalk
        - Sunset over lake
      children: []
    - tag: Restaurant
      attrs: {}
      fields:
        name: Harbourfront Bistro (recommended)
        time_block: 7:30 PM
        description: Casual waterfront dining to recover from travel.
        highlights:
        - Lake views
        - Seafood options
      children: []
  - tag: Day
    attrs:
      index: '2'
    fields:
      theme: Museums & Cultural Core
    children:
    - tag: POI
      attrs: {}
      fields:
        name: Royal Ontario Museum (ROM)
        time_block: 9:30 AM - 12:30 PM
        description: Major natural history and world cultures museum.
        highlights:
        - Galleries
        - Special exhibits
      children: []
    - tag: POI
      attrs: {}
      fields:
        name: Bata Shoe Museum / University of Toronto stroll
        time_block: 1:00 PM - 3:00 PM
        description: Smaller specialty museum and campus walk nearby.
        highlights:
        - Unique collections
        - Historic architecture
      children: []
    - tag: Restaurant
      attrs: {}
      fields:
        name: Museum District Cafe
        time_block: 12:30 PM
        description: Lunch near ROM with quick service for museum visits.
        highlights:
        - Sandwiches
        - Salads
      children: []
  - tag: Day
    attrs:
      index: '3'
    fields:
      theme: Historic Distillery & Shopping
    children:
    - tag: POI
      attrs: {}
      fields:
        name: Distillery District
        time_block: 10:00 AM - 1:00 PM
        description: Cobblestone streets, galleries, boutiques, and historic buildings.
        highlights:
        - Shops
        - Galleries
        - Photo spots
      children: []
    - tag: POI
      attrs: {}
      fields:
        name: St. Lawrence Market
        time_block: 1:30 PM - 3:00 PM
        description: Iconic market for local foods and crafts.
        highlights:
        - Peameal bacon sandwich
        - Artisan stalls
      children: []
    - tag: Restaurant
      attrs: {}
      fields:
        name: St. Lawrence Eatery
        time_block: 1:00 PM
        description: Casual market dining for local specialties.
        highlights:
        - Local produce
        - Quick bites
      children: []
  - tag: Day
    attrs:
      index: '4'
    fields:
      theme: Toronto Islands & Relaxation
    children:
    - tag: Transport
      attrs: {}
      fields:
        mode: Ferry
        time_block: Morning
        notes: Take ferry from Jack Layton Ferry Terminal; check schedule.
      children: []
    - tag: POI
      attrs: {}
      fields:
        name: Centre Island & Hanlan's Point
        time_block: 10:00 AM - 4:00 PM
        description: Beaches, picnic areas, bike paths and skyline views.
        highlights:
        - Picnic
        - Beach time
        - Bike rentals
      children: []
    - tag: Restaurant
      attrs: {}
      fields:
        name: Island Cafe / Picnic
        time_block: Lunch
        description: Casual options on the island or self-catered picnic.
        highlights:
        - Outdoor seating
        - Casual menu
      children: []
  - tag: Day
    attrs:
      index: '5'
    fields:
      theme: 'Neighbourhoods: Kensington & Queen West'
    children:
    - tag: POI
      attrs: {}
      fields:
        name: Kensington Market
        time_block: 10:00 AM - 12:30 PM
        description: Eclectic shops, street art, vintage stores and multicultural
          eats.
        highlights:
        - Vintage shops
        - Street art
        - Eclectic cafes
      children: []
    - tag: POI
      attrs: {}
      fields:
        name: Queen West (art and boutiques)
        time_block: 1:30 PM - 4:30 PM
        description: Trendy shops, galleries and music venues along Queen Street West.
        highlights:
        - Independent boutiques
        - Murals
      children: []
    - tag: Restaurant
      attrs: {}
      fields:
        name: Local Brunch Spot
        time_block: 9:30 AM or 1:00 PM
        description: Hip cafe for brunch or late lunch in the neighbourhoods.
        highlights:
        - Brunch menu
        - Coffee specialties
      children: []
  - tag: Day
    attrs:
      index: '6'
    fields:
      theme: 'Art & Science: AGO & Science Centre'
    children:
    - tag: POI
      attrs: {}
      fields:
        name: Art Gallery of Ontario (AGO)
        time_block: 10:00 AM - 1:00 PM
        description: Extensive Canadian and international art collections.
        highlights:
        - Group of Seven
        - Contemporary exhibits
      children: []
    - tag: POI
      attrs: {}
      fields:
        name: Ontario Science Centre (optional afternoon)
        time_block: 2:30 PM - 5:00 PM
        description: Interactive science exhibits ideal for families and curious adults.
        highlights:
        - Hands-on exhibits
        - Planetarium shows
      children: []
    - tag: Restaurant
      attrs: {}
      fields:
        name: Gallery District Bistro
        time_block: 1:15 PM
        description: Lunch near AGO with light menu.
        highlights:
        - Light meals
        - Nearby walkable area
      children: []
  - tag: Day
    attrs:
      index: '7'
    fields:
      theme: Day Trip to Niagara Falls or Free Day
    children:
    - tag: Transport
      attrs: {}
      fields:
        mode: Car / Coach / Train
        time_block: Morning to Evening
        notes: Choose a day trip to Niagara Falls (1.5 hr) or use the day for shopping/relaxing
          in Toronto.
      children: []
    - tag: POI
      attrs: {}
      fields:
        name: Niagara Falls (if chosen)
        time_block: 10:00 AM - 4:00 PM
        description: Iconic waterfalls, boat tours, and scenic viewpoints.
        highlights:
        - Boat tour (Maid of the Mist/Hornblower)
        - Clifton Hill options
      children: []
    - tag: Restaurant
      attrs: {}
      fields:
        name: Farewell Dinner Restaurant (Downtown)
        time_block: 7:00 PM
        description: Nice dinner downtown to close the trip, reserve in advance.
        highlights:
        - Fine dining option
        - Local specialties
      children: []
