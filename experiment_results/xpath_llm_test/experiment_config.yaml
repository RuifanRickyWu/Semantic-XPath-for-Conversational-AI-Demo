name: "xpath_llm_test"

# Pipelines to run for each query
pipelines:
  - semantic_xpath
  # - incontext

# Queries to run
queries:
  - "My college friend lives in Mississauga, about an hour from downtown. What days are without any work commitments or flights."
  - "The weather forecast shows heavy rain on Day 7. I want to check which activities are outdoors that I might need to reschedule."
  - "My sister and nephew are joining me on Day 6. He's 10 years old. What activities do I already have planned that would be fun for a kid?"
  - "I'm putting together my expense report. Can you show me all the restaurants I've booked that are really expensive"
  - "I've been stuck in meetings most of the week. Which days have nature activities where I can actually get outside and see some green space?"
  - "I just checked my spending and I'm way over budget. I need to cut the expensive dinners from the itinerary and find cheaper alternatives later."
  - "It's definitely going to rain all day on Day 7. Cancel any outdoor activities, I'll figure out replacements."
  - "I actually went to the CN Tower on my last trip to Toronto. Remove any CN Tower activities. I'd rather do something new."
  - "Bad news. my friend who was going to host me at Niagara just tested positive for COVID. I need to cancel the whole Niagara Falls day trip."
  - "I'm exhausted. I'm going to take Day 5 as a personal day and skip all the work stuff. Cancel every work-related activity on that day."
  - "I just noticed Day 2 has no breakfast—my first meeting is at 9am and I'll be starving. Add a quick hotel breakfast before the meeting."
  - "The workshop on Day 3 ends at 11am and then I have nothing until the AGO at noon. Add a coffee break in between. there's a good cafe near the gallery."
  - "It's actually my wedding anniversary on Day 9. I want to add a special romantic dinner somewhere nice—maybe Scaramouche with the city view."
  - "My partner is arriving on Day 6 and she's vegetarian. Add a plant-based restaurant for dinner that night—I've heard Planta is good."
  - "I completely forgot about souvenirs. Add a stop at Roots or the Hudson's Bay flagship on Day 10 morning before the CN Tower. I need to grab gifts before I fly out."
