# Semantic XPath BE configuration

xpath_executor:
  scoring_method: "entailment"  # one of: llm, entailment, cosine

entailment:
  hypothesis_template: "This is related to {predicate}."

openai:
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-5.2"
  max_tokens: 50000
  reasoning_effort: "low"

context:
  memory_level: "medium"
  window_sizes:
    low: 2
    medium: 5
    high: 10
