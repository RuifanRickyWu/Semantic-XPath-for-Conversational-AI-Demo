name: root_task_version
description: Global container for tasks with versions
hierarchy: "Root (root)\n  `-- Task (container, indexed by @name)\n      `-- Version\
  \ (version, indexed by @number)"
nodes:
  Root:
    type: root
    fields: []
    children:
    - Task
  Task:
    type: container
    index_attr: name
    fields:
    - title
    - description
    - status
    children:
    - Version
  Version:
    type: version
    index_attr: number
    fields:
    - patch_info
    - conversation_history
    - created_at
    - schema_name
    - data_name
    - summary
    children: []
