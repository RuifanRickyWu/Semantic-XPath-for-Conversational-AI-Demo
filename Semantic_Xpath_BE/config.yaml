# Semantic XPath BE configuration

xpath_executor:
  scoring_method: "entailment"  # one of: llm, entailment, cosine
  score_threshold: 0.1

entailment:
  backend: "modal"  # one of: modal, local
  hypothesis_template: "This is related to {predicate}."
  local:
    model_name: "facebook/bart-large-mnli"
    device: null  # null = auto detect
  modal:
    app_name: "semantic-xpath-bart"
    function_name: "score_entailment_batch"
    environment_name: main  # null = use MODAL_ENVIRONMENT_NAME env var when set

openai:
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-5.2"
  max_tokens: 50000
  reasoning_effort: "low"


context:
  memory_level: "medium"
  window_sizes:
    low: 2
    medium: 5
    high: 10
