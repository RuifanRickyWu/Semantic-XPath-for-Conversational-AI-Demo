name: "full_experiment"

# Queries to run - each entry is a session (list of queries)
# Single-turn: ["query"]
# Multi-turn: ["query1", "query2", ...] - queries share the same tree state
queries:
  - [
      "Which projects are currently stuck or blocked?",
      "Show me all high priority tasks related to my research.",
      "Find the last task I added to the Garage Repair project.",
      "I need to see the first two tasks for the NSERC grant application.",
      "What tasks do I have that are NOT related to work?",
      "Show me tasks about either 'running' or 'meditation'",
      "Which project has the most completed tasks?",
      "Find any task mentioning 'coffee' anywhere in the system.",
      "What are my learning goals for this semester?",
      "Show me the second task in my Teaching Assistant duties.",
    ]

# =============================================================================
# EXPERIMENT CONFIGURATION
# All parameters for this experiment are defined below
# =============================================================================

config:
  # Schema configuration
  # Choose which schema and data file to use
  active_schema: "todolist" # Options: itinerary, todolist, session_recommendation
  active_data: "todolist" # Options: todolist, travel_toronto_10day

  # LLM Client configuration
  # Model options: "gpt-4o", "gpt-5", "gpt-5-mini", "o1", "o3-mini", etc.
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-5-mini"
    max_tokens: 16384
    # For GPT-4 series: temperature controls creativity (0-1)
    temperature: 0
    # For GPT-5/o1/o3 series: reasoning_effort controls reasoning depth
    # Options: none (fastest), low, medium (default), high, xhigh (deepest)
    reasoning_effort: "low"

  # XPath executor settings
  xpath_executor:
    top_k: 5
    score_threshold: 0.05
    # Scoring method: "llm", "entailment", or "cosine"
    scoring_method: "entailment"

  # In-context pipeline settings (single LLM call with full tree)
  incontext_pipeline:
    temperature: 0
    max_tokens: 16384

  # Entailment scorer settings
  entailment:
    model: "facebook/bart-large-mnli"
    hypothesis_template: "This is related to {predicate}."
    # device: auto-detected if not set (cuda > mps > cpu)

  # Cosine similarity scorer settings
  cosine:
    model: "sentence-transformers/msmarco-distilbert-base-tas-b"
    predicate_template: "{predicate}"
    # device: auto-detected if not set (cuda > mps > cpu)

