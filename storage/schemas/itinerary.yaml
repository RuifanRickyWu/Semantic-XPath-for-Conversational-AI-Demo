# Itinerary Tree Schema
# Defines the structure for travel itinerary trees

name: "itinerary"
description: "Travel itinerary with days, POIs and restaurants"

# Tree hierarchy (for documentation and LLM prompt generation)
hierarchy: |
  Itinerary (root)
  └── Day (container, indexed by @index)
      ├── POI (leaf)
      └── Restaurant (leaf)

# Node type definitions with fields
nodes:
  Itinerary:
    type: root
    fields: []
    children: ["Day"]

  Day:
    type: container
    index_attr: "index"  # Uses <Day index="1"> for identification
    fields: []  # Container node - no direct content fields
    children: ["POI", "Restaurant"]

  POI:
    type: leaf
    fields:
      - name
      - time_block
      - description
      - travel_method
      - expected_cost
      - highlights
    children: []

  Restaurant:
    type: leaf
    fields:
      - name
      - time_block
      - description
      - travel_method
      - expected_cost
      - highlights
    children: []

# Available data files for this schema
data_files:
  travel_memory_3day: "memory/travel/travel_memory_3day.xml"
  travel_memory_5day: "memory/travel/travel_memory_5day.xml"
  travel_memory_3day_diff: "memory/travel/travel_memory_3day_diff.xml"
  travel_memory_10day_themed: "memory/travel/travel_memory_10day_themed.xml"
  travel_toronto_10day: "memory/travel/travel_toronto_10day.xml"

# Default data file to use
default_data: "travel_memory_3day"

# XPath query generation prompt components
examples_file: "prompts/xpath_examples_itinerary.txt"
