# Support System Tree Schema
# Defines the structure for customer support ticket trees

name: "support"
description: "Customer support system with tickets, symptoms, causes and resolutions"

# Tree hierarchy (for documentation and LLM prompt generation)
hierarchy: |
  SupportSystem (root)
  ├── Customer
  │   └── Ticket
  │       ├── Symptom
  │       ├── Cause
  │       └── Resolution

# Node type definitions
nodes:
  SupportSystem:
    type: root
    fields: []
    children: ["Customer"]
    
  Customer:
    type: container
    fields: ["name", "description", "email", "account_type"]
    children: ["Ticket"]
    
  Ticket:
    type: container
    fields: ["title", "description", "status", "priority", "created_at"]
    children: ["Symptom", "Cause", "Resolution"]
    
  Symptom:
    type: leaf
    fields: ["name", "description", "severity"]
    children: []
    
  Cause:
    type: leaf
    fields: ["name", "description", "category"]
    children: []
    
  Resolution:
    type: leaf
    fields: ["name", "description", "effectiveness"]
    children: []

# Available data files for this schema
data_files:
  support_sample: "memory/support/support_sample.xml"

# Default data file to use
default_data: "support_sample"

# Associated prompt file for XPath query generation
prompt_file: "prompts/xpath_query_generator_support.txt"



