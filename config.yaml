# Schema configuration
# Choose which schema and data file to use
active_schema: "todolist" #Can choose between itinerary and todolist
active_data: "todolist_sample"  # Options: travel_memory_3day, travel_memory_5day, todolist_sample

openai:
  api_key: "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"
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 4096

xpath_executor:
  top_k: 3
  score_threshold: 0.01
  # Scoring method: "llm", "entailment", or "cosine"
  scoring_method: "entailment"

entailment:
  model: "facebook/bart-large-mnli"
  hypothesis_template: "This is related to {predicate}."
  # device: auto-detected if not set (cuda > mps > cpu)

cosine:
  model: "sentence-transformers/msmarco-distilbert-base-tas-b"
  predicate_template: "{predicate}"
  # device: auto-detected if not set (cuda > mps > cpu)
